<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="app_title">Читалка манги</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="reader-header">
      <div class="reader-header-inner">
        <!-- Ліва частина: Назад + Назва -->
        <div class="reader-header-left">
          <a href="index.html" class="back-btn" data-i18n="reader_back" aria-label="Повернутися до каталогу">←</a>
          <span id="mangaTitle" class="reader-title">Завантаження...</span>
        </div>

        <!-- Центр: Навігація главами -->
        <div class="reader-nav">
          <button id="prevChapter" data-i18n-title="reader_prev_title" title="Попередня глава" aria-label="Попередня глава">◀</button>

          <select id="chapterSelect" title="Виберіть главу для читання" aria-label="Вибір глави">
            <option value="">Завантаження...</option>
          </select>

          <button id="nextChapter" data-i18n-title="reader_next_title" title="Наступна глава" aria-label="Наступна глава">▶</button>

          <span id="chapterNumber" class="chapter-num" aria-live="polite">Гл. 1</span>
          <span id="pageCount" class="page-count"></span>
        </div>

        <!-- Права частина: Налаштування + Мова -->
        <div class="reader-header-right">
          <button id="settingsToggle" class="settings-toggle" data-i18n-title="reader_settings" title="Налаштування" aria-label="Відкрити налаштування">
            ⚙️
          </button>

          <div class="language-selector">
            <select id="languageSelect" title="Вибір мови" aria-label="Вибір мови">
              <option value="uk">🇺🇦 UA</option>
              <option value="en">🇬🇧 EN</option>
              <option value="ru">🇷🇺 RU</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Панель налаштувань (прихована) -->
      <div id="settingsPanel" class="settings-panel">
        <div class="setting-group">
          <label for="widthSlider" data-i18n="settings_width">Ширина:</label>
          <div class="slider-container">
            <span class="width-label" data-i18n="settings_narrow">Вузько</span>
            <input type="range" id="widthSlider" min="30" max="100" value="80" />
            <span class="width-label" data-i18n="settings_wide">Широко</span>
          </div>
          <span id="widthValue" class="width-value">80%</span>
        </div>

        <div class="setting-group">
          <label for="bgColorSelect" data-i18n="settings_bg">Фон:</label>
          <select id="bgColorSelect" title="Вибір кольору фону">
            <option value="#0d0d0d" data-i18n="settings_bg_dark">Темний</option>
            <option value="#1a1a1a" data-i18n="settings_bg_darker">Дуже темний</option>
            <option value="#2b2b2b" data-i18n="settings_bg_gray">Сірий</option>
            <option value="#f5f0e8" data-i18n="settings_bg_sepia">Світлий (сепія)</option>
            <option value="#ffffff" data-i18n="settings_bg_white">Білий</option>
          </select>
        </div>

        <button id="resetSettingsBtn" class="reset-btn" data-i18n="settings_reset">↺ Скинути</button>
      </div>
    </header>

    <main id="readerContainer" class="reader-container">
      <div id="pagesContainer" role="main" aria-label="Сторінки манги"></div>
    </main>

    <script src="i18n.js"></script>
    <script src="reader.js"></script>
  </body>
</html>
